name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[envs,dev]"
      - name: Unit tests
        run: pytest -q tests/test_eval.py tests/test_portal_registry.py tests/test_portal_data_alignment.py tests/test_plug_and_play.py

  smoke-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[envs,dev,playwright]"
          playwright install chromium --with-deps
      - name: Portal startup sanity
        run: |
          python - <<'PY'
          from pathlib import Path
          from fixturebench.eval.portal import ManagedPortal
          root = Path(".").resolve()
          with ManagedPortal("v19", root) as url:
              import urllib.request
              with urllib.request.urlopen(f"{url}/login", timeout=5) as r:
                  assert r.status == 200, r.status
              print("v19 ok", url)
          PY
      - name: Write-back + portal invariant tests
        run: pytest -q tests/test_writeback.py tests/test_virtualized_grid.py tests/test_final_portals.py
      - name: Smoke eval
        run: |
          PYTHONPATH=. fixturebench run \
            --agent examples.playwright_smoke_agent:PlaywrightSmokeAgent \
            --tag smoke
